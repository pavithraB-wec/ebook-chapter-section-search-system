{% extends "base.html" %}
{% block content %}

<div class="main">

<h1>Upload Document</h1>
<p>Upload a PDF book. It will be automatically parsed into chapters and sections.</p>

<!-- Upload Box -->
<div class="upload-box">

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Start Upload</button>
</form>
</div>


<!-- Success / Error Message -->
{% if message %}
<p style="color:green; margin-top:20px;">
    {{ message }}
</p>
{% endif %}


<!-- INFO CARDS -->
<div class="info-cards">

    <div class="card clickable" onclick="showInfo('indexing')">
        Automatic Indexing
    </div>

    <div class="card clickable" onclick="showInfo('structure')">
        Structure Detection
    </div>

    <div class="card clickable" onclick="showInfo('storage')">
        Secure Storage
    </div>

</div>


<!-- MODAL -->
<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeInfo()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
    </div>
</div>

</div>


<!-- JAVASCRIPT -->
<script>

function showInfo(type)
{
    let title = "";
    let text = "";

    if(type === "indexing")
    {
        title = "Automatic Indexing";

        text =
        "Step 1: Upload PDF\n" +
        "Step 2: Text extracted using PyPDF2\n" +
        "Step 3: Detect chapters\n" +
        "Step 4: Store sections with page numbers\n" +
        "Step 5: Save to processed_data.json\n\n" +
        "This enables fast search without reopening the PDF.";
    }

    if(type === "structure")
    {
        title = "Structure Detection";

        text =
        "The system detects:\n\n" +
        "Book → Chapters → Sections\n\n" +
        "Each chapter is identified using regex.\n" +
        "Each line is stored with page number.";
    }

    if(type === "storage")
    {
        title = "Secure Storage";

        text =
        "Uploaded PDFs are stored in the uploads folder.\n\n" +
        "Processed text is saved in data/processed_data.json.\n\n" +
        "Data resets when server restarts.";
    }

    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalText").innerText = text;
    document.getElementById("infoModal").style.display = "block";
}

function closeInfo()
{
    document.getElementById("infoModal").style.display = "none";
}

</script>

{% endblock %}
